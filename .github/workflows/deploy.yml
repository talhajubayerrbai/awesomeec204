name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest || true

      - name: Run tests
        run: |
          pytest --tb=short || true

      - name: Lint (advisory)
        run: |
          pip install flake8 || true
          flake8 app/ --max-line-length=120 || true

        continue-on-error: true
  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible and SSM plugin
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip3 install ansible boto3 botocore --break-system-packages || pip3 install ansible boto3 botocore
          ansible-galaxy collection install community.aws amazon.aws

      - name: Install AWS SSM Session Manager plugin
        run: |
          curl -sSfL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Wait for SSM registration
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          echo "Waiting for SSM registration of $INSTANCE_ID ..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "Attempt $i: SSM PingStatus = $STATUS"
            if [ "$STATUS" = "Online" ]; then
              echo "Instance is SSM-ready."
              break
            fi
            sleep 20
          done
          if [ "$STATUS" != "Online" ]; then
            echo "ERROR: Instance did not become SSM-ready in time."
            exit 1
          fi

      - name: Run Ansible playbook
        env:
          INSTANCE_ID: ${{ needs.provision.outputs.instance_id }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "${INSTANCE_ID}," \
            -e "ansible_connection=community.aws.aws_ssm" \
            -e "ansible_aws_ssm_region=${AWS_REGION}" \
            -e "ansible_user=ubuntu" \
            -e "ansible_remote_tmp=/tmp/.ansible/tmp" \
            -e "ansible_aws_ssm_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -e "app_env=production"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB endpoint
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing ${APP_URL}/health/ ..."
          for i in $(seq 1 20); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health/" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "SUCCESS: App is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "FAILED: App did not respond with 2xx/3xx after retries."
          exit 1
